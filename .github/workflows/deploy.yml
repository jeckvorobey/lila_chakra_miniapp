name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: site
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      - name: Setup Node ⚙️
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'npm'

      - name: Install dependencies 🔧
        run: npm install

      - name: Resolve production env 🧩
        env:
          API_URL_VAR: ${{ vars.VITE_API_URL }}
          API_URL_SECRET: ${{ secrets.VITE_API_URL }}
          API_PREFIX_VAR: ${{ vars.VITE_API_PREFIX }}
          TG_BOT_USERNAME_VAR: ${{ vars.VITE_TG_BOT_USERNAME }}
        run: |
          API_URL="${API_URL_VAR:-$API_URL_SECRET}"
          if [ -z "$API_URL" ]; then
            echo "::error::VITE_API_URL is not set in Environment 'site' (Variables or Secrets)."
            exit 1
          fi

          echo "VITE_API_URL=$API_URL" >> "$GITHUB_ENV"
          echo "VITE_API_PREFIX=${API_PREFIX_VAR:-/api}" >> "$GITHUB_ENV"
          echo "VITE_TG_BOT_USERNAME=${TG_BOT_USERNAME_VAR:-ILeelaBot}" >> "$GITHUB_ENV"

      - name: Validate production env 🔍
        run: |
          if [ -z "$VITE_API_URL" ]; then
            echo "::error::VITE_API_URL is not set. Configure it in Environment 'site' (Variables or Secrets)."
            exit 1
          fi

      - name: Build project 🏗️
        run: npx quasar build

      - name: Add .nojekyll 📄
        # Это отключает Jekyll, чтобы GitHub Pages не блокировал файлы Vite с "_"
        run: touch dist/spa/.nojekyll

      - name: Deploy 🚀
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist/spa
          branch: gh-pages
          clean: true
