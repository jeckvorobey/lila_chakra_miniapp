name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: site
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      - name: Setup Node ⚙️
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'npm'

      - name: Install dependencies 🔧
        run: npm install

      - name: Validate production env 🔍
        env:
          VITE_API_URL: ${{ vars.VITE_API_URL != '' && vars.VITE_API_URL || secrets.VITE_API_URL }}
        run: |
          if [ -z "$VITE_API_URL" ]; then
            echo "::error::VITE_API_URL is not set. Configure it in Settings -> Secrets and variables -> Actions (Variables or Secrets)."
            exit 1
          fi

      - name: Build project 🏗️
        env:
          VITE_API_URL: ${{ vars.VITE_API_URL != '' && vars.VITE_API_URL || secrets.VITE_API_URL }}
          VITE_API_PREFIX: ${{ vars.VITE_API_PREFIX != '' && vars.VITE_API_PREFIX || '/api' }}
          VITE_TG_BOT_USERNAME: ${{ vars.VITE_TG_BOT_USERNAME != '' && vars.VITE_TG_BOT_USERNAME || 'ILeelaBot' }}
        run: npx quasar build

      - name: Add .nojekyll 📄
        # Это отключает Jekyll, чтобы GitHub Pages не блокировал файлы Vite с "_"
        run: touch dist/spa/.nojekyll

      - name: Deploy 🚀
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist/spa
          branch: gh-pages
          clean: true
