version: "2"
type: frontend
tech_stack:
  - TypeScript
  - Vue 3
  - Quasar
  - Vite
  - Pinia
  - Axios
routes:
  - path: /diary/:id
    file: src/pages/diary/DiaryDetailPage.vue
    auth_required: true
    description: Детальная страница дневника игры с историей ходов.
features:
  - name: История ходов в дневнике
    description: Отображение ходов игры в виде таймлайна с интерпретацией ИИ, вопросами и инсайтами в виде карточек.
    files:
      - src/pages/diary/DiaryDetailPage.vue
      - src/pages/diary/diary-timeline.ts
    entry_route: /diary/1
    user_interactions:
      - Открыть страницу дневника.
      - Просмотреть карточки ответов ИИ ментора.
      - Раскрыть уточняющие вопросы в списке.
      - Нажать кнопку "Записать инсайт" или "Изменить инсайт".
    api_calls:
      - method: GET
        endpoint: /games/{game_id}/diary
    auth_required: true
known_limitations: []
